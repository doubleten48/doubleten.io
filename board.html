<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DoubleTen — บอร์ด</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #c0392b; --red-dark: #922b21;
    --bg: #1e1e1e; --card: #242424; --line: #2e2e2e;
    --text: #e8e8e8; --muted: #666; --sub: #aaa;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh; padding-bottom: 3rem;
  }
  a { color: inherit; text-decoration: none; }

  /* ── HEADER ── */
  header {
    background: var(--card); border-bottom: 1px solid var(--line);
    padding: 14px 1.5rem; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 10;
  }
  .logo-wrap { display: flex; align-items: center; gap: 10px; }
  .logo-wordmark { font-size: 18px; font-weight: 700; color: #fff; }
  .header-actions { display: flex; align-items: center; gap: 12px; }
  .btn-newpost {
    background: var(--red); color: #fff; padding: 8px 16px;
    border-radius: 8px; font-size: 14px; font-weight: 600;
    border: none; cursor: pointer; font-family: inherit;
  }
  .btn-newpost:hover { background: var(--red-dark); }
  .user-chip {
    display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--sub);
  }

  .container { max-width: 720px; margin: 0 auto; padding: 1.5rem; }

  /* ── BOARD GRID ── */
  .section-title {
    font-size: 14px; color: var(--muted); margin: 1.5rem 0 0.75rem;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .board-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
  }
  .board-card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 10px; padding: 14px; cursor: pointer;
    transition: border-color 0.15s;
  }
  .board-card:hover { border-color: var(--red); }
  .board-card.active { border-color: var(--red); background: #2a1f1e; }
  .board-icon { font-size: 22px; margin-bottom: 6px; }
  .board-name { font-size: 14px; font-weight: 600; color: #fff; }
  .board-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── POST LIST ── */
  .post-card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 10px; padding: 16px; margin-bottom: 10px;
    cursor: pointer; transition: border-color 0.15s;
  }
  .post-card:hover { border-color: #444; }
  .post-board-tag {
    display: inline-block; font-size: 11px; color: var(--red);
    background: rgba(192,57,43,0.12); padding: 2px 8px; border-radius: 4px;
    margin-bottom: 8px;
  }
  .post-title { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 6px; }
  .post-excerpt {
    font-size: 13px; color: var(--sub); line-height: 1.5; margin-bottom: 10px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .post-meta {
    display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--muted);
  }
  .post-meta span { display: flex; align-items: center; gap: 4px; }

  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 14px; }
  .loading { text-align: center; padding: 3rem; color: var(--muted); }
  .spinner {
    width: 28px; height: 28px; border: 3px solid #2e2e2e;
    border-top-color: var(--red); border-radius: 50%;
    animation: spin 0.7s linear infinite; margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .board-grid { grid-template-columns: repeat(2, 1fr); }
    .container { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <a href="/" class="logo-wrap">
    <svg width="36" height="26" viewBox="0 0 140 100">
      <rect x="2" y="10" width="58" height="80" rx="10" fill="#c0392b"/>
      <text x="31" y="63" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-family="'DM Sans',sans-serif" font-size="36" font-weight="700" letter-spacing="-1">10</text>
      <rect x="80" y="10" width="58" height="80" rx="10" fill="#2a2a2a" stroke="#c0392b" stroke-width="2"/>
      <text x="109" y="63" text-anchor="middle" dominant-baseline="middle"
        fill="#c0392b" font-family="'DM Sans',sans-serif" font-size="36" font-weight="700" letter-spacing="-1">10</text>
    </svg>
    <span class="logo-wordmark">DoubleTen</span>
  </a>
  <div class="header-actions" id="header-actions">
    <!-- filled by JS -->
  </div>
</header>

<div class="container">
  <div class="section-title">หมวดหมู่</div>
  <div class="board-grid" id="board-grid">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <div class="section-title" id="post-section-title">กระทู้ล่าสุด</div>
  <div id="post-list">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://dnrcardbuuwnvuridubb.supabase.co'
  const SUPABASE_KEY = 'sb_publishable_uz4Tj8HDZef7T2OLEzyvUw_wcGsn0ZW'
  const { createClient } = supabase
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY)

  let currentUser = null
  let currentBoardId = null // null = ทุกหมวด
  let boards = []

  const params = new URLSearchParams(window.location.search)
  const boardSlugFromUrl = params.get('board')

  async function init() {
    const { data: { session } } = await sb.auth.getSession()
    currentUser = session?.user || null
    renderHeader()

    await loadBoards()
    await loadPosts()
  }

  function renderHeader() {
    const el = document.getElementById('header-actions')
    if (currentUser) {
      const username = currentUser.user_metadata?.username || 'สมาชิก'
      el.innerHTML = `
        <button class="btn-newpost" onclick="goNewPost()">+ ตั้งกระทู้</button>
        <a href="/profile.html" class="user-chip">👤 ${username}</a>
      `
    } else {
      el.innerHTML = `
        <a href="/auth.html?tab=login" class="user-chip" style="color:#c0392b;">เข้าสู่ระบบ</a>
      `
    }
  }

  function goNewPost() {
    if (!currentUser) {
      window.location.href = '/auth.html?tab=login'
      return
    }
    const boardParam = currentBoardId ? `?board_id=${currentBoardId}` : ''
    window.location.href = '/new-post.html' + boardParam
  }

  async function loadBoards() {
    const { data, error } = await sb.from('boards').select('*').order('sort_order')
    if (error) {
      document.getElementById('board-grid').innerHTML = '<div class="empty-state">โหลดหมวดหมู่ไม่สำเร็จ</div>'
      return
    }
    boards = data

    // ถ้ามี board slug ใน URL ให้ filter ตามนั้น
    if (boardSlugFromUrl) {
      const matched = boards.find(b => b.slug === boardSlugFromUrl)
      if (matched) currentBoardId = matched.id
    }

    renderBoardGrid()
  }

  function renderBoardGrid() {
    const grid = document.getElementById('board-grid')
    let html = `
      <div class="board-card ${!currentBoardId ? 'active' : ''}" onclick="selectBoard(null)">
        <div class="board-icon">📋</div>
        <div class="board-name">ทั้งหมด</div>
        <div class="board-desc">ทุกหมวดหมู่</div>
      </div>
    `
    boards.forEach(b => {
      html += `
        <div class="board-card ${currentBoardId === b.id ? 'active' : ''}" onclick="selectBoard('${b.id}', '${b.slug}')">
          <div class="board-icon">${b.icon || '📌'}</div>
          <div class="board-name">${b.name}</div>
          <div class="board-desc">${b.description || ''}</div>
        </div>
      `
    })
    grid.innerHTML = html
  }

  function selectBoard(boardId, slug) {
    currentBoardId = boardId
    const url = slug ? `/board.html?board=${slug}` : '/board.html'
    window.history.pushState({}, '', url)
    renderBoardGrid()
    loadPosts()
  }

  async function loadPosts() {
    const listEl = document.getElementById('post-list')
    const titleEl = document.getElementById('post-section-title')
    listEl.innerHTML = '<div class="loading"><div class="spinner"></div></div>'

    if (currentBoardId) {
      const b = boards.find(x => x.id === currentBoardId)
      titleEl.textContent = b ? `${b.icon} ${b.name}` : 'กระทู้'
    } else {
      titleEl.textContent = 'กระทู้ล่าสุด'
    }

    let query = sb.from('posts')
      .select('id, title, content, likes_count, comments_count, views_count, created_at, board_id, author_id')
      .order('created_at', { ascending: false })
      .limit(30)

    if (currentBoardId) query = query.eq('board_id', currentBoardId)

    const { data: posts, error } = await query

    if (error || !posts || posts.length === 0) {
      listEl.innerHTML = '<div class="empty-state">ยังไม่มีกระทู้ในหมวดนี้<br>เป็นคนแรกที่ตั้งกระทู้เลยสิ!</div>'
      return
    }

    // ดึง username ของ author ทั้งหมด
    const authorIds = [...new Set(posts.map(p => p.author_id))]
    const { data: profiles } = await sb.from('profiles').select('user_id, username').in('user_id', authorIds)
    const profileMap = {}
    ;(profiles || []).forEach(p => profileMap[p.user_id] = p.username)

    const boardMap = {}
    boards.forEach(b => boardMap[b.id] = b)

    listEl.innerHTML = posts.map(p => {
      const author = profileMap[p.author_id] || 'ผู้ใช้'
      const board = boardMap[p.board_id]
      const timeAgo = formatTimeAgo(p.created_at)
      const excerpt = p.content.replace(/<[^>]*>/g, '').slice(0, 100)

      return `
        <div class="post-card" onclick="window.location.href='/post.html?id=${p.id}'">
          ${!currentBoardId && board ? `<span class="post-board-tag">${board.icon} ${board.name}</span>` : ''}
          <div class="post-title">${escapeHtml(p.title)}</div>
          <div class="post-excerpt">${escapeHtml(excerpt)}</div>
          <div class="post-meta">
            <span>👤 ${escapeHtml(author)}</span>
            <span>🕐 ${timeAgo}</span>
            <span>❤️ ${p.likes_count || 0}</span>
            <span>💬 ${p.comments_count || 0}</span>
            <span>👁 ${p.views_count || 0}</span>
          </div>
        </div>
      `
    }).join('')
  }

  function escapeHtml(str) {
    const div = document.createElement('div')
    div.textContent = str
    return div.innerHTML
  }

  function formatTimeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime()
    const mins = Math.floor(diff / 60000)
    if (mins < 1) return 'เมื่อสักครู่'
    if (mins < 60) return `${mins} นาทีที่แล้ว`
    const hrs = Math.floor(mins / 60)
    if (hrs < 24) return `${hrs} ชม.ที่แล้ว`
    const days = Math.floor(hrs / 24)
    if (days < 7) return `${days} วันที่แล้ว`
    return new Date(dateStr).toLocaleDateString('th-TH')
  }

  init()
</script>
</body>
</html>
