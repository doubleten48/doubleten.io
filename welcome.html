<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DoubleTen — ยืนยันอีเมลสำเร็จ</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #c0392b; --red-dark: #922b21;
    --bg: #1e1e1e; --card: #242424; --line: #2e2e2e;
    --text: #e8e8e8; --muted: #666; --sub: #aaa;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 2rem 1rem;
  }
  .logo-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; text-decoration: none; }
  .logo-wordmark { font-size: 20px; font-weight: 700; color: #fff; }
  .logo-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; padding: 2.5rem 2rem; width: 100%; max-width: 420px;
    text-align: center;
  }
  .icon { font-size: 56px; margin-bottom: 1.25rem; }
  .title { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .sub { font-size: 14px; color: var(--sub); line-height: 1.7; margin-bottom: 1.5rem; }
  .countdown {
    font-size: 13px; color: var(--muted); margin-top: 1.25rem;
  }
  .countdown span { color: var(--red); font-weight: 700; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 12px 24px; border-radius: 8px; font-size: 15px;
    font-weight: 600; cursor: pointer; border: none;
    font-family: inherit; width: 100%; transition: background 0.15s;
    background: var(--red); color: #fff;
  }
  .btn:hover { background: var(--red-dark); }
  .spinner {
    width: 32px; height: 32px; border: 3px solid #2e2e2e;
    border-top-color: var(--red); border-radius: 50%;
    animation: spin 0.7s linear infinite; margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading { text-align: center; padding: 2rem; color: var(--muted); font-size: 14px; }
  .progress-bar {
    width: 100%; height: 3px; background: var(--line);
    border-radius: 2px; margin-top: 1.5rem; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--red); border-radius: 2px;
    width: 100%; transition: width 1s linear;
  }
</style>
</head>
<body>

<a href="/" class="logo-wrap">
  <svg width="44" height="32" viewBox="0 0 140 100">
    <rect x="2" y="10" width="58" height="80" rx="10" fill="#c0392b"/>
    <text x="31" y="63" text-anchor="middle" dominant-baseline="middle"
      fill="#fff" font-family="'DM Sans',sans-serif" font-size="36" font-weight="700" letter-spacing="-1">10</text>
    <rect x="80" y="10" width="58" height="80" rx="10" fill="#2a2a2a" stroke="#c0392b" stroke-width="2"/>
    <text x="109" y="63" text-anchor="middle" dominant-baseline="middle"
      fill="#c0392b" font-family="'DM Sans',sans-serif" font-size="36" font-weight="700" letter-spacing="-1">10</text>
  </svg>
  <div>
    <div class="logo-wordmark">DoubleTen</div>
    <div class="logo-sub">By น้อนแดง</div>
  </div>
</a>

<div class="card" id="main-card">
  <div class="loading">
    <div class="spinner"></div>
    กำลังยืนยันบัญชี...
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://dnrcardbuuwnvuridubb.supabase.co'
  const SUPABASE_KEY = 'sb_publishable_uz4Tj8HDZef7T2OLEzyvUw_wcGsn0ZW'
  const { createClient } = supabase
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY)

  const REDIRECT_DELAY = 5 // วินาที

  async function init() {
    let session = null

    // รอให้ supabase parse token จาก URL hash
    await new Promise(resolve => {
      const { data: { subscription } } = sb.auth.onAuthStateChange((event, s) => {
        if (s) { session = s; subscription.unsubscribe(); resolve() }
      })
      setTimeout(resolve, 3000)
    })

    if (!session) {
      const { data } = await sb.auth.getSession()
      session = data.session
    }

    if (!session) {
      showError('ไม่พบข้อมูลการยืนยัน กรุณาลองใหม่หรือสมัครใหม่อีกครั้ง')
      return
    }

    const user = session.user
    const email = user.email
    const username = user.user_metadata?.username || 'สมาชิกใหม่'
    const pwHint = user.user_metadata?.pw_hint || null

    // ส่ง welcome email (fire & forget)
    sendWelcomeEmail(email, username, pwHint)

    // แสดงหน้า verify สำเร็จ แล้ว countdown redirect
    showVerified(username, email)
  }

  async function sendWelcomeEmail(email, username, password) {
    try {
      const sentKey = 'welcome_sent_' + email
      if (sessionStorage.getItem(sentKey)) return
      sessionStorage.setItem(sentKey, '1')

      await fetch(`${SUPABASE_URL}/functions/v1/send-welcome`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${SUPABASE_KEY}`,
        },
        body: JSON.stringify({ email, username, password }),
      })
    } catch (e) {
      console.warn('Welcome email error:', e)
    }
  }

  function showVerified(username, email) {
    let seconds = REDIRECT_DELAY

    document.getElementById('main-card').innerHTML = `
      <div class="icon">✅</div>
      <div class="title">ยืนยัน Email สำเร็จ!</div>
      <div class="sub">
        ยินดีต้อนรับ <strong style="color:#fff;">${username}</strong><br>
        บัญชีของคุณพร้อมใช้งานแล้ว<br>
        เราได้ส่ง email แจ้งรายละเอียดไปที่ <span style="color:var(--red);">${email}</span> แล้ว
      </div>
      <button class="btn" onclick="goLogin()">เข้าสู่ระบบเลย</button>
      <div class="countdown">กำลังพาไปหน้าเข้าสู่ระบบใน <span id="cd">${seconds}</span> วินาที</div>
      <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
    `

    // countdown
    const timer = setInterval(() => {
      seconds--
      const cdEl = document.getElementById('cd')
      const progEl = document.getElementById('prog')
      if (cdEl) cdEl.textContent = seconds
      if (progEl) progEl.style.width = (seconds / REDIRECT_DELAY * 100) + '%'
      if (seconds <= 0) { clearInterval(timer); goLogin() }
    }, 1000)
  }

  function goLogin() {
    window.location.href = '/auth.html?tab=login'
  }

  function showError(msg) {
    document.getElementById('main-card').innerHTML = `
      <div class="icon">⚠️</div>
      <div class="title">เกิดข้อผิดพลาด</div>
      <div class="sub">${msg}</div>
      <button class="btn" onclick="window.location.href='/auth.html'">กลับหน้าสมัคร/เข้าสู่ระบบ</button>
    `
  }

  init()
</script>
</body>
</html>
