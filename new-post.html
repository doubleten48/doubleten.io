<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DoubleTen — ตั้งกระทู้ใหม่</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #c0392b; --red-dark: #922b21;
    --bg: #1e1e1e; --card: #242424; --line: #2e2e2e;
    --text: #e8e8e8; --muted: #666; --sub: #aaa;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh; padding-bottom: 3rem;
  }
  a { color: inherit; text-decoration: none; }

  header {
    background: var(--card); border-bottom: 1px solid var(--line);
    padding: 14px 1.5rem; display: flex; align-items: center; gap: 12px;
  }
  .back-btn { font-size: 14px; color: var(--sub); cursor: pointer; }
  .header-title { font-size: 16px; font-weight: 600; color: #fff; }

  .container { max-width: 680px; margin: 0 auto; padding: 1.5rem; }

  .form-group { margin-bottom: 1.25rem; }
  label { display: block; font-size: 13px; color: var(--sub); margin-bottom: 6px; }
  select, input[type="text"], input[type="url"], textarea {
    width: 100%; background: var(--card); border: 1px solid var(--line);
    border-radius: 8px; padding: 12px; color: var(--text); font-size: 14px;
    font-family: inherit; outline: none;
  }
  select:focus, input:focus, textarea:focus { border-color: var(--red); }
  textarea { min-height: 220px; resize: vertical; line-height: 1.6; font-family: 'DM Sans', monospace; }

  .char-count { font-size: 11px; color: var(--muted); text-align: right; margin-top: 4px; }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px;
    background: var(--card); border: 1px solid var(--line); border-radius: 8px;
    padding: 8px;
  }
  .tb-btn {
    background: var(--bg); border: 1px solid var(--line); border-radius: 6px;
    padding: 6px 10px; font-size: 12px; color: var(--sub); cursor: pointer;
    font-family: inherit; transition: all 0.15s; white-space: nowrap;
  }
  .tb-btn:hover { border-color: var(--red); color: #fff; }
  .tb-btn b, .tb-btn i, .tb-btn u { color: inherit; }
  .tb-sep { width: 1px; background: var(--line); margin: 0 2px; }
  .tb-select {
    background: var(--bg); border: 1px solid var(--line); border-radius: 6px;
    padding: 6px 8px; font-size: 12px; color: var(--sub); font-family: inherit;
  }

  /* ── IMAGE UPLOAD ── */
  .image-tools {
    display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap;
  }
  .btn-img-upload {
    background: linear-gradient(135deg, #f39c12, #e67e22); color: #fff;
    border: none; border-radius: 8px; padding: 10px 18px; font-size: 13px;
    font-weight: 600; cursor: pointer; font-family: inherit;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-img-upload:hover { opacity: 0.9; }
  .btn-img-url {
    background: var(--card); border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 18px; font-size: 13px; color: var(--sub); cursor: pointer;
    font-family: inherit;
  }
  .btn-img-url:hover { border-color: var(--red); color: #fff; }
  .url-input-row {
    display: none; gap: 8px; margin-bottom: 8px;
  }
  .url-input-row.show { display: flex; }
  .url-input-row input { flex: 1; }
  .url-input-row button {
    background: var(--red); color: #fff; border: none; border-radius: 8px;
    padding: 0 16px; font-size: 13px; cursor: pointer; font-family: inherit;
  }
  .upload-progress { font-size: 12px; color: var(--muted); margin-bottom: 8px; display: none; }
  .upload-progress.show { display: block; }

  .btn-submit-row { display: flex; gap: 10px; margin-top: 0.75rem; }
  .btn-preview {
    flex: 1; background: var(--card); border: 1px solid var(--line); color: var(--sub);
    padding: 14px; border-radius: 8px; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .btn-preview:hover { border-color: #444; color: #fff; }
  .btn-submit {
    flex: 2; background: var(--red); color: #fff; padding: 14px;
    border-radius: 8px; font-size: 15px; font-weight: 600; border: none;
    cursor: pointer; font-family: inherit;
  }
  .btn-submit:hover { background: var(--red-dark); }
  .btn-submit:disabled { background: #444; cursor: not-allowed; }

  .alert {
    padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 1rem; display: none;
  }
  .alert.show { display: block; }
  .alert-error { background: rgba(231,76,60,0.12); color: #e74c3c; border: 1px solid rgba(231,76,60,0.3); }

  .login-required {
    text-align: center; padding: 3rem 1.5rem; color: var(--sub);
  }
  .login-required a { color: var(--red); text-decoration: underline; }

  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── PREVIEW MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 100; align-items: flex-start; justify-content: center; padding: 2rem 1rem;
    overflow-y: auto;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    max-width: 640px; width: 100%; padding: 1.5rem; margin-top: 1rem;
  }
  .modal-close {
    text-align: right; color: var(--muted); cursor: pointer; font-size: 14px; margin-bottom: 0.5rem;
  }
  .preview-title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 1rem; }
  .preview-content { font-size: 14px; line-height: 1.8; color: var(--text); }
  .preview-content img { max-width: 100%; border-radius: 8px; margin: 8px 0; }
  .preview-content iframe { max-width: 100%; border-radius: 8px; margin: 8px 0; }
</style>
</head>
<body>

<header>
  <span class="back-btn" onclick="history.back()">← กลับ</span>
  <span class="header-title">ตั้งกระทู้ใหม่</span>
</header>

<div class="container" id="container">
  <div style="text-align:center;padding:3rem;color:#666;">กำลังโหลด...</div>
</div>

<div class="modal-overlay" id="preview-modal" onclick="if(event.target===this) closePreview()">
  <div class="modal-box">
    <div class="modal-close" onclick="closePreview()">✕ ปิด</div>
    <div class="preview-title" id="preview-title-el"></div>
    <div class="preview-content" id="preview-content-el"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://dnrcardbuuwnvuridubb.supabase.co'
  const SUPABASE_KEY = 'sb_publishable_uz4Tj8HDZef7T2OLEzyvUw_wcGsn0ZW'
  const { createClient } = supabase
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY)

  let currentUser = null
  let boards = []

  const params = new URLSearchParams(window.location.search)
  const preselectBoardId = params.get('board_id')

  async function init() {
    const { data: { session } } = await sb.auth.getSession()
    currentUser = session?.user || null

    if (!currentUser) {
      renderLoginRequired()
      return
    }

    const { data } = await sb.from('boards').select('*').order('sort_order')
    boards = data || []
    renderForm()
  }

  function renderLoginRequired() {
    document.getElementById('container').innerHTML = `
      <div class="login-required">
        🔒 กรุณาเข้าสู่ระบบก่อนตั้งกระทู้<br><br>
        <a href="/auth.html?tab=login">เข้าสู่ระบบ</a> หรือ <a href="/auth.html?tab=register">สมัครสมาชิก</a>
      </div>
    `
  }

  function renderForm() {
    const options = boards.map(b =>
      `<option value="${b.id}" ${b.id === preselectBoardId ? 'selected' : ''}>${b.icon} ${b.name}</option>`
    ).join('')

    document.getElementById('container').innerHTML = `
      <div class="alert alert-error" id="alert-error"></div>
      <div class="form-group">
        <label>หมวดหมู่ *</label>
        <select id="post-board">
          <option value="">เลือกหมวดหมู่</option>
          ${options}
        </select>
      </div>
      <div class="form-group">
        <label>หัวข้อกระทู้ *</label>
        <input type="text" id="post-title" placeholder="ตั้งหัวข้อให้น่าสนใจ" maxlength="150"/>
        <div class="char-count"><span id="title-count">0</span>/150</div>
      </div>
      <div class="form-group">
        <label>เนื้อหา *</label>

        <div class="toolbar">
          <button type="button" class="tb-btn" onclick="wrapSelection('**','**')"><b>B</b></button>
          <button type="button" class="tb-btn" onclick="wrapSelection('*','*')"><i>I</i></button>
          <button type="button" class="tb-btn" onclick="wrapSelection('__','__')"><u>U</u></button>
          <div class="tb-sep"></div>
          <select class="tb-select" id="color-select" onchange="applyColor(this.value)">
            <option value="">สีตัวอักษร</option>
            <option value="#e74c3c">🔴 แดง</option>
            <option value="#3498db">🔵 น้ำเงิน</option>
            <option value="#2ecc71">🟢 เขียว</option>
            <option value="#f1c40f">🟡 เหลือง</option>
            <option value="#9b59b6">🟣 ม่วง</option>
            <option value="#ffffff">⚪ ขาว</option>
          </select>
          <select class="tb-select" id="size-select" onchange="applySize(this.value)">
            <option value="">ขนาดตัวอักษร</option>
            <option value="12px">เล็ก</option>
            <option value="16px">ปกติ</option>
            <option value="20px">ใหญ่</option>
            <option value="28px">ใหญ่มาก</option>
          </select>
          <div class="tb-sep"></div>
          <button type="button" class="tb-btn" onclick="wrapSelection('> ','')">Quote</button>
        </div>

        <div class="image-tools">
          <button type="button" class="btn-img-upload" onclick="document.getElementById('file-input').click()">
            📤 ฝากรูป
          </button>
          <input type="file" id="file-input" accept="image/jpeg,image/png,image/gif,image/webp" style="display:none" onchange="handleFileSelect(event)"/>
          <button type="button" class="btn-img-url" onclick="toggleUrlInput()">🔗 วาง URL รูป</button>
        </div>
        <div class="url-input-row" id="url-input-row">
          <input type="url" id="external-img-url" placeholder="วาง URL รูปจากเว็บอื่น เช่น https://pic.in.th/..."/>
          <button type="button" onclick="insertExternalUrl()">แทรก</button>
        </div>
        <div class="upload-progress" id="upload-progress">กำลังอัปโหลด...</div>

        <textarea id="post-content" placeholder="เขียนเนื้อหากระทู้... (วางลิงก์ YouTube จะแสดงเป็นวิดีโออัตโนมัติ)" maxlength="5000"></textarea>
        <div class="char-count"><span id="content-count">0</span>/5000</div>
      </div>
      <div class="btn-submit-row">
        <button type="button" class="btn-preview" onclick="showPreview()">👁 แสดงตัวอย่าง</button>
        <button class="btn-submit" id="btn-submit" onclick="submitPost()">ตั้งกระทู้</button>
      </div>
    `

    document.getElementById('post-title').addEventListener('input', e => {
      document.getElementById('title-count').textContent = e.target.value.length
    })
    document.getElementById('post-content').addEventListener('input', e => {
      document.getElementById('content-count').textContent = e.target.value.length
    })
  }

  // ── TOOLBAR ACTIONS ──
  function getTextarea() { return document.getElementById('post-content') }

  function wrapSelection(before, after) {
    const ta = getTextarea()
    const start = ta.selectionStart, end = ta.selectionEnd
    const selected = ta.value.substring(start, end) || 'ข้อความ'
    const newText = ta.value.substring(0, start) + before + selected + after + ta.value.substring(end)
    ta.value = newText
    ta.focus()
    ta.selectionStart = start + before.length
    ta.selectionEnd = start + before.length + selected.length
    document.getElementById('content-count').textContent = ta.value.length
  }

  function applyColor(color) {
    if (!color) return
    const ta = getTextarea()
    const start = ta.selectionStart, end = ta.selectionEnd
    const selected = ta.value.substring(start, end) || 'ข้อความ'
    const tag = `[color=${color}]${selected}[/color]`
    ta.value = ta.value.substring(0, start) + tag + ta.value.substring(end)
    document.getElementById('color-select').value = ''
    document.getElementById('content-count').textContent = ta.value.length
    ta.focus()
  }

  function applySize(size) {
    if (!size) return
    const ta = getTextarea()
    const start = ta.selectionStart, end = ta.selectionEnd
    const selected = ta.value.substring(start, end) || 'ข้อความ'
    const tag = `[size=${size}]${selected}[/size]`
    ta.value = ta.value.substring(0, start) + tag + ta.value.substring(end)
    document.getElementById('size-select').value = ''
    document.getElementById('content-count').textContent = ta.value.length
    ta.focus()
  }

  // ── IMAGE UPLOAD ──
  async function handleFileSelect(event) {
    const file = event.target.files[0]
    if (!file) return

    if (file.size > 5 * 1024 * 1024) {
      showError('ไฟล์ใหญ่เกิน 5MB กรุณาเลือกไฟล์ใหม่')
      return
    }

    const progressEl = document.getElementById('upload-progress')
    progressEl.classList.add('show')
    progressEl.textContent = 'กำลังอัปโหลด...'

    const ext = file.name.split('.').pop()
    const fileName = `${currentUser.id}/${Date.now()}.${ext}`

    const { data, error } = await sb.storage.from('post-images').upload(fileName, file)

    if (error) {
      progressEl.textContent = 'อัปโหลดไม่สำเร็จ กรุณาลองใหม่'
      setTimeout(() => progressEl.classList.remove('show'), 3000)
      return
    }

    const { data: urlData } = sb.storage.from('post-images').getPublicUrl(fileName)
    insertImageTag(urlData.publicUrl)

    progressEl.textContent = '✅ อัปโหลดสำเร็จ'
    setTimeout(() => progressEl.classList.remove('show'), 2000)
    event.target.value = ''
  }

  function toggleUrlInput() {
    document.getElementById('url-input-row').classList.toggle('show')
  }

  function insertExternalUrl() {
    const input = document.getElementById('external-img-url')
    const url = input.value.trim()
    if (!url) return
    insertImageTag(url)
    input.value = ''
    document.getElementById('url-input-row').classList.remove('show')
  }

  function insertImageTag(url) {
    const ta = getTextarea()
    const tag = `\n[img]${url}[/img]\n`
    const pos = ta.selectionStart
    ta.value = ta.value.substring(0, pos) + tag + ta.value.substring(pos)
    document.getElementById('content-count').textContent = ta.value.length
    ta.focus()
  }

  // ── RENDER CONTENT (สำหรับ preview) ──
  function renderContent(raw) {
    let html = escapeHtml(raw)

    html = html.replace(/\[img\](.*?)\[\/img\]/g, '<img src="$1" loading="lazy"/>')
    html = html.replace(/\[color=(#[0-9a-fA-F]{3,6})\](.*?)\[\/color\]/g, '<span style="color:$1">$2</span>')
    html = html.replace(/\[size=(\d+px)\](.*?)\[\/size\]/g, '<span style="font-size:$1">$2</span>')
    html = html.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
    html = html.replace(/\*(.+?)\*/g, '<i>$1</i>')
    html = html.replace(/__(.+?)__/g, '<u>$1</u>')
    html = html.replace(/^&gt; (.+)$/gm, '<blockquote style="border-left:3px solid #c0392b;padding-left:10px;color:#aaa;margin:8px 0;">$1</blockquote>')
    html = html.replace(
      /(https?:\/\/(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})\S*)/g,
      '<div style="position:relative;padding-bottom:56.25%;height:0;"><iframe src="https://www.youtube.com/embed/$2" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" allowfullscreen></iframe></div>'
    )

    return html.replace(/\n/g, '<br>')
  }

  function escapeHtml(str) {
    const div = document.createElement('div')
    div.textContent = str
    return div.innerHTML
  }

  function showPreview() {
    const title = document.getElementById('post-title').value.trim() || '(ยังไม่มีหัวข้อ)'
    const content = document.getElementById('post-content').value.trim() || '(ยังไม่มีเนื้อหา)'
    document.getElementById('preview-title-el').textContent = title
    document.getElementById('preview-content-el').innerHTML = renderContent(content)
    document.getElementById('preview-modal').classList.add('show')
  }

  function closePreview() {
    document.getElementById('preview-modal').classList.remove('show')
  }

  function showError(msg) {
    const el = document.getElementById('alert-error')
    el.textContent = msg
    el.classList.add('show')
  }

  async function submitPost() {
    const boardId = document.getElementById('post-board').value
    const title = document.getElementById('post-title').value.trim()
    const content = document.getElementById('post-content').value.trim()

    document.getElementById('alert-error').classList.remove('show')

    if (!boardId) { showError('กรุณาเลือกหมวดหมู่'); return }
    if (title.length < 4) { showError('หัวข้อกระทู้ต้องมีอย่างน้อย 4 ตัวอักษร'); return }
    if (content.length < 10) { showError('เนื้อหากระทู้ต้องมีอย่างน้อย 10 ตัวอักษร'); return }

    const btn = document.getElementById('btn-submit')
    btn.disabled = true
    btn.innerHTML = '<span class="spinner"></span>กำลังตั้งกระทู้...'

    const { data, error } = await sb.from('posts').insert({
      board_id: boardId,
      author_id: currentUser.id,
      title: title,
      content: content
    }).select().single()

    if (error) {
      showError('เกิดข้อผิดพลาด กรุณาลองใหม่')
      btn.disabled = false
      btn.innerHTML = 'ตั้งกระทู้'
      return
    }

    window.location.href = '/post.html?id=' + data.id
  }

  init()
</script>
</body>
</html>
